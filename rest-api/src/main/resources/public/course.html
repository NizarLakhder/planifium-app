<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Détails du cours</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Retour</button>
  <h1>Détails du cours</h1>
</div>

<section id="course-details" class="panel">
  <p class="loading-text">Chargement du cours...</p>
</section>

<button class="scroll-btn" id="scrollBtn" onclick="handleScroll()"><i class="fa-solid fa-chevron-down"></i></button>

<script>
function handleScroll() {
  const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 10;
  if (atBottom) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
}

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollBtn');
  if (!btn) return;
  const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 10;
  btn.innerHTML = atBottom
    ? '<i class="fa-solid fa-chevron-up"></i>'
    : '<i class="fa-solid fa-chevron-down"></i>';
});
</script>
<script src="course.js"></script>
</body>
</html>
